<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self'">
  <title>RTL Fixer v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../editor/editor.css">
  <link rel="stylesheet" href="./widget.css">
</head>
<body data-mode="collapsed">

  <!-- Mode 1: Collapsed circle (real <button> for keyboard reachability) -->
  <button type="button" class="widget-collapsed" id="collapsed" aria-label="فتح RTL Fixer">
    <span class="widget-bubble">
      <span class="widget-bubble-letter" aria-hidden="true">ع</span>
      <span class="widget-bubble-pulse" id="bubble-pulse" aria-hidden="true"></span>
      <span class="widget-bubble-badge" id="bubble-badge" aria-hidden="true" hidden></span>
    </span>
  </button>

  <!-- Mode 2: Notification bar (real <button> for keyboard reachability) -->
  <button type="button" class="widget-notification" id="notification" aria-label="نص جديد متاح، اضغط للعرض">
    <span class="widget-notif-chevron" aria-hidden="true">←</span>
    <span class="widget-notif-dot" aria-hidden="true"></span>
    <span class="widget-notif-text">نص جديد متاح — دوس عشان تشوفه</span>
  </button>

  <!-- Mode 3: Expanded card with embedded editor -->
  <div class="widget-expanded" id="expanded">
    <!-- Thin drag handle + settings + pin toggle + collapse. Title lives in the editor header below. -->
    <div class="widget-titlebar">
      <span class="widget-title-spacer" aria-hidden="true"></span>
      <div class="widget-titlebar-actions">
        <button id="widget-settings-btn" class="widget-icon-btn" aria-label="الإعدادات" title="الإعدادات">⚙</button>
        <button id="widget-pin-btn" class="widget-icon-btn" aria-label="تثبيت فوق الكل" title="تثبيت فوق الكل" aria-pressed="true">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 1a4 4 0 0 0-4 4c0 2 4 7 4 7s4-5 4-7a4 4 0 0 0-4-4zm0 5.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
          </svg>
        </button>
        <button id="widget-collapse-btn" class="widget-icon-btn" aria-label="صغّر" title="صغّر">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <rect x="3" y="7" width="10" height="2" rx="1"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="widget-editor-host">
      <div class="app" data-layout="vertical">
        <header class="header">
          <h1 lang="en">RTL <span class="accent">·</span> Fixer</h1>
          <div class="header-right">
            <div class="layout-switch" role="radiogroup" aria-label="تخطيط الواجهة">
              <button class="layout-opt" data-layout="vertical" role="radio" aria-checked="true" aria-label="تخطيط عمودي" title="عمودي">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                  <rect x="2" y="3"  width="12" height="2" rx="0.5"/>
                  <rect x="2" y="7"  width="12" height="2" rx="0.5"/>
                  <rect x="2" y="11" width="12" height="2" rx="0.5"/>
                </svg>
              </button>
              <button class="layout-opt" data-layout="horizontal" role="radio" aria-checked="false" aria-label="تخطيط أفقي" title="أفقي">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                  <rect x="2" y="3"  width="5"  height="10" rx="0.5"/>
                  <rect x="9" y="3"  width="5"  height="10" rx="0.5"/>
                </svg>
              </button>
            </div>
            <span class="meta" lang="en">growthmora · v2</span>
          </div>
        </header>

        <section class="block input-block">
          <div class="block-head">
            <span class="block-label"><span class="arrow">←</span>من Claude</span>
            <button id="clear-input">مسح</button>
          </div>
          <textarea
            id="input"
            placeholder="الصق هنا النص اللي طلع متلخبط من Claude Code..."
            spellcheck="false"
          ></textarea>
        </section>

        <section class="block grow output-block">
          <div class="block-head">
            <span class="block-label">النسخة المنسقة</span>
            <button id="copy-output" class="primary" disabled>انسخ النص</button>
          </div>
          <div class="output-wrap">
            <div
              class="output"
              id="output"
              dir="auto"
              data-placeholder="هيظهر هنا النص متنسق..."
            ></div>
          </div>
        </section>

        <section class="block reply-block">
          <div class="block-head">
            <span class="block-label"><span class="arrow">→</span>ردك لـ Claude</span>
            <button id="clear-reply">مسح</button>
            <button id="copy-reply" class="primary" disabled>
              نسخ الرد<kbd class="kbd">⌃↵</kbd>
            </button>
          </div>
          <textarea
            id="reply"
            placeholder="اكتب ردك بالعربي هنا، وبعدين انسخه و الصقه في Claude Code..."
            spellcheck="false"
          ></textarea>
        </section>

        <div class="status-bar" id="status" role="status" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <!-- Off-screen live region for widget mode change announcements -->
  <div id="widget-live" class="sr-only" role="status" aria-live="polite"></div>

  <script type="module" src="./widget.ts"></script>
  <script type="module" src="../editor/editor.ts"></script>
</body>
</html>
