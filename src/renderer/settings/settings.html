<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self'">
  <title>الإعدادات — RTL Fixer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./settings.css">
</head>
<body>
  <main class="settings">
    <header>
      <h1>الإعدادات</h1>
      <p class="subtitle">عدّل الاختصارات، المظهر، والتشغيل التلقائي</p>
    </header>

    <section class="group">
      <h2>الاختصارات</h2>
      <p class="hint">دوس على الخانة واضغط الاختصار الجديد. كل اختصار لازم يحتوي Ctrl أو Alt أو Shift مع حرف أو رقم.</p>

      <div class="hotkey-row">
        <label for="hk-toggle">إظهار/إخفاء النافذة</label>
        <input type="text" id="hk-toggle" data-action="toggle" readonly placeholder="Control+Shift+R">
      </div>
      <div class="hotkey-row">
        <label for="hk-render">عرض آخر نص نسخته</label>
        <input type="text" id="hk-render" data-action="render" readonly placeholder="Control+Shift+V">
      </div>
      <div class="hotkey-row">
        <label for="hk-copy">نسخ الرد</label>
        <input type="text" id="hk-copy" data-action="copyReply" readonly placeholder="Control+Shift+C">
      </div>
      <div class="hotkey-row">
        <label for="hk-clear">مسح الكل</label>
        <input type="text" id="hk-clear" data-action="clear" readonly placeholder="Control+Shift+X">
      </div>
    </section>

    <section class="group">
      <h2>المظهر</h2>
      <div class="setting-row">
        <label for="theme-select">المظهر</label>
        <select id="theme-select">
          <option value="light">فاتح</option>
          <option value="dark">داكن</option>
          <option value="system">حسب النظام</option>
        </select>
      </div>
      <div class="setting-row">
        <label for="layout-select">التخطيط الافتراضي</label>
        <select id="layout-select">
          <option value="vertical">عمودي</option>
          <option value="horizontal">أفقي</option>
        </select>
      </div>
    </section>

    <section class="group">
      <h2>التشغيل</h2>
      <div class="setting-row toggle-row">
        <label for="autostart-toggle">تشغيل تلقائي مع Windows</label>
        <input type="checkbox" id="autostart-toggle">
      </div>
    </section>

    <div class="status-bar" id="status" role="status" aria-live="polite"></div>
  </main>

  <script type="module" src="./settings.ts"></script>
</body>
</html>
